<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Orden de Fabricación</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- 🔥 LIBRERÍA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* 🔥 FIX GLOBAL */
* {
  box-sizing: border-box;
}

body {
  font-family: Arial;
  background: #e6e6e6;
  margin: 0;
}

.container {
  width: 95%;
  margin: 20px auto;
  background: white;
  border: 1px solid #999;
  padding: 10px;
}

/* HEADER */
.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
}

.info {
  width: 100%;
  justify-self: start;
}
.info div { margin: 5px 0; }

.panel {
  width: 100%;
  max-width: 300px;
  background: #ddd;
  padding: 10px;
  border: 1px solid #aaa;
  justify-self: end;
}

input, button {
  width: 100%;
  padding: 6px;
  margin-top: 8px;
}

button {
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

#btnValidar {
  margin-top: 20px;
}
#btnReporte {
  margin-top: 20px;
}
button:disabled {
  background: #999;
  cursor: not-allowed;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #999;
  padding: 5px;
  text-align: center;
}

th { background: #ccc; }

.ok { background: #a3ffb0 !important; }
.error { background: #ffb0b0 !important; }

/* mensaje */
#mensaje {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px;
  color: white;
  display: none;
}

/* timer */
#timer {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin-top: 10px;
  color: #333;
}

/* LOGO */
#logoContainer {
  display: flex;
  justify-content: center;
  align-items: center;
}

#logoContainer img {
  width: 25vw;
  max-width: 100%;
  height: auto;
  object-fit: contain;
  opacity: 0.9;
}

</style>
</head>

<body>

<div id="mensaje"></div>

<div class="container" id="reporte">

<div class="header">

<div class="info">
  <div><b>Descripción producto:</b> <span id="producto">---</span></div>
  <div><b>Cantidad planificada:</b> <span id="cantidad">---</span></div>
</div>

<div id="logoContainer">
  <img src="logo.jpg" alt="Logo">
</div>

<div class="panel">
  <label><b>Lote:</b></label>
  <input type="text" id="loteInput" placeholder="Ej: L001">

  <button id="btnEnviar">📤 Cargar Datos</button>
  <button id="btnValidar">✅ Validar Peso</button>
  <button id="btnReporte">📄 Descargar Reporte</button>

  <div id="timer"></div>
</div>

</div>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Kardex</th>
  <th>Descripción</th>
  <th>Cantidad</th>
  <th>Unidad</th>
  <th>✔</th>
</tr>
</thead>
<tbody id="tablaComponentes"></tbody>
</table>

</div>

<script>

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

const topicRequest = "dariza/lote/request";
const topicResponse = "dariza/lote/response";
const topicBarcode = "dariza/barcode/response";
const topicPeso = "dariza/peso/web";
const topicValidar = "dariza/validacion/request";

let articuloActual = null;
let pesoKG = 0;
let pesoG = 0;

// 🔥 FORMATEAR FECHA
function formatearFecha(fechaISO) {
  if (!fechaISO) return "---";

  const d = new Date(fechaISO);

  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,'0') + "-" +
    String(d.getDate()).padStart(2,'0') + " " +
    String(d.getHours()).padStart(2,'0') + ":" +
    String(d.getMinutes()).padStart(2,'0') + ":" +
    String(d.getSeconds()).padStart(2,'0');
}

// 🔥 DIVIDIR TEXTO
function dividirTexto(texto, ancho) {
  texto = texto || "";
  return [
    texto.substring(0, ancho),
    texto.length > ancho ? texto.substring(ancho, ancho * 2) : ""
  ];
}

client.on("connect", () => {
  client.subscribe(topicResponse);
  client.subscribe(topicBarcode);
  client.subscribe(topicPeso);
});

function mostrarMensaje(texto, color="red") {
  const msg = document.getElementById("mensaje");
  msg.innerText = texto;
  msg.style.background = color;
  msg.style.display = "block";
  setTimeout(() => msg.style.display = "none", 2000);
}

btnEnviar.onclick = () => {
  const lote = document.getElementById("loteInput").value.trim().toUpperCase();

  if (!lote) {
    mostrarMensaje("⚠️ Ingresa un lote", "orange");
    return;
  }

  client.publish(topicRequest, JSON.stringify({ lote }));
};

client.on("message", (topic, message) => {

  const data = JSON.parse(message.toString());

  if (topic === topicResponse) {

    if (data.status === "error") {
      mostrarMensaje("❌ " + data.mensaje);

      producto.innerText = "---";
      cantidad.innerText = "---";
      tablaComponentes.innerHTML = "";

      return;
    }

    producto.innerText = data.lote.producto;
    cantidad.innerText = data.lote.cantidad_planificada + " kg";

    tablaComponentes.innerHTML = "";

    data.componentes.forEach((c, i) => {

      const yaValidado = c.validado == 1;

      tablaComponentes.innerHTML += `
        <tr data-kardex="${c.kardex}" 
            data-validado="${c.validado}" 
            data-fecha="${c.fecha_validacion ? formatearFecha(c.fecha_validacion) : ''}">
          <td>${i+1}</td>
          <td>${c.kardex}</td>
          <td>${c.descripcion}</td>
          <td>${c.cantidad_requerida}</td>
          <td>${c.unidad}</td>
          <td>${yaValidado ? "✅" : "❌"}</td>
        </tr>`;
    });

    btnValidar.disabled = true;
  }

  if (topic === topicBarcode) {

    if (data.kardex === "0") return;

    const filas = document.querySelectorAll("#tablaComponentes tr");

    filas.forEach(f => f.classList.remove("ok", "error"));

    let encontrado = false;

    filas.forEach(fila => {
      if (fila.dataset.kardex === data.kardex) {
        encontrado = true;

        if (fila.dataset.validado == "1") {
          mostrarMensaje("⚠️ Ya validado", "orange");
          btnValidar.disabled = true;
          return;
        }

        if (data.status === "ok") {
          fila.classList.add("ok");
          articuloActual = data.kardex;
          btnValidar.disabled = false;
        } else {
          fila.classList.add("error");
          btnValidar.disabled = true;
        }
      }
    });

    if (!encontrado) {
      mostrarMensaje("❌ Artículo no encontrado");
    }
  }

  if (topic === topicPeso) {
    pesoKG = data.kg;
    pesoG = data.g;
  }

});

btnValidar.onclick = () => {

  if (!articuloActual) {
    mostrarMensaje("⚠️ Escanea primero", "orange");
    return;
  }

  let t = 3;

  timer.innerText = `⏳ Validando en ${t}...`;

  const intervalo = setInterval(() => {
    t--;
    timer.innerText = `⏳ Validando en ${t}...`;

    if (t <= 0) {
      clearInterval(intervalo);
      timer.innerText = "";
      validarPeso();
    }

  }, 1000);
};

// 🔥🔥🔥 SOLO AQUÍ SE CORRIGIÓ 🔥🔥🔥
function validarPeso() {

  const fila = document.querySelector(`tr[data-kardex="${articuloActual}"]`);
  if (!fila) return;

  const cantidad = parseFloat(fila.children[3].innerText);
  const unidad = fila.children[4].innerText;

  let peso = (unidad === "kg") ? pesoKG : pesoG;

  // 🔧 NORMALIZAR
  peso = Number(peso);
  const cantidadNorm = Number(cantidad);

  let tolerancia = (unidad === "kg") ? 0.1 : 1;

  // 🔥 EPSILON PARA BORDE EXACTO
  const EPS = 0.00001;
  const diferencia = Math.abs(peso - cantidadNorm);

  if (diferencia <= tolerancia + EPS) {

    fila.classList.remove("ok");
    fila.children[5].innerText = "✅";
    fila.dataset.validado = "1";

    const now = new Date();
    const fecha =
      now.getFullYear() + "-" +
      String(now.getMonth()+1).padStart(2,'0') + "-" +
      String(now.getDate()).padStart(2,'0') + " " +
      String(now.getHours()).padStart(2,'0') + ":" +
      String(now.getMinutes()).padStart(2,'0') + ":" +
      String(now.getSeconds()).padStart(2,'0');

    fila.dataset.fecha = fecha;

    const lote = document.getElementById("loteInput").value.trim().toUpperCase();

    client.publish(topicValidar, JSON.stringify({
      lote: lote,
      kardex: articuloActual,
      fecha_validacion: fecha
    }));

    client.publish("dariza/print", JSON.stringify({
      lote: lote,
      producto: producto.innerText,
      cantidad_planificada: cantidad.innerText,
      kardex: articuloActual,
      articulo: fila.children[2].innerText,
      cantidad: fila.children[3].innerText + " " + fila.children[4].innerText,
      peso: peso + " " + fila.children[4].innerText,
      fecha: fecha
    }));

    mostrarMensaje("✔ Validado", "green");

    articuloActual = null;
    btnValidar.disabled = true;

  } else {
    mostrarMensaje(`❌ Peso incorrecto (${peso})`);
  }
}
// 🔥 REPORTE
document.getElementById("btnReporte").onclick = () => {

  const lote = document.getElementById("loteInput").value.trim().toUpperCase();
  const filas = document.querySelectorAll("#tablaComponentes tr");

  if (!lote) {
    mostrarMensaje("⚠️ Lote no seleccionado", "orange");
    return;
  }

  if (filas.length === 0) {
    mostrarMensaje("⚠️ No hay datos para exportar", "orange");
    return;
  }

  const pad = (txt, n) => String(txt).padEnd(n, " ");

  const W = { num:4, kardex:12, desc:25, cant:15, estado:10, fecha:16 };

  let contenido = `
DARYZA S.A.
ORDEN DE FABRICACIÓN
----------------------------------------

Lote: ${lote}
Producto: ${producto.innerText}
Cantidad Planificada: ${cantidad.innerText}
Fecha y Hora: ${new Date().toLocaleString()}

----------------------------------------

${pad("#",W.num)}${pad("Kardex",W.kardex)}${pad("Descripción",W.desc)}${pad("Cantidad",W.cant)}${pad("Estado",W.estado)}${pad("Fecha y Hora",W.fecha)}

`;

  let completo = true;

  filas.forEach((f, i) => {

    const estado = f.children[5].innerText;
    if (estado === "❌") completo = false;

    const fecha = f.dataset.fecha ? formatearFecha(f.dataset.fecha) : "---";

    let fecha1 = "---";
    let fecha2 = "";

    if (fecha !== "---") {
      const partes = fecha.split(" ");
      fecha1 = partes[0];
      fecha2 = partes[1] || "";
    }

    const [desc1, desc2] = dividirTexto(f.children[2].innerText, W.desc);

    contenido +=
      pad(i+1, W.num) +
      pad(f.children[1].innerText, W.kardex) +
      pad(desc1, W.desc) +
      pad(f.children[3].innerText + " " + f.children[4].innerText, W.cant) +
      pad(estado, W.estado) +
      pad(fecha1, W.fecha) +
      "\n";

    contenido +=
      pad("", W.num) +
      pad("", W.kardex) +
      pad(desc2, W.desc) +
      pad("", W.cant) +
      pad("", W.estado) +
      (fecha2 ? fecha2.padEnd(W.fecha, " ") : "".padEnd(W.fecha, " ")) +
      "\n";
  });

  contenido += `\n----------------------------------------\n`;
  contenido += `Estado del lote: ${completo ? "✔ COMPLETO" : "❌ INCOMPLETO"}\n\n\n`;

  contenido += `Operario: ____________________________\n\n`;
  contenido += `Firma:    ____________________________\n`;

  const temp = document.createElement("div");

  temp.style.padding = "30px"; // 🔥 antes 40px
  temp.style.fontSize = "14px";
  temp.style.fontFamily = "Courier New, monospace";
  temp.style.whiteSpace = "pre";
  temp.style.lineHeight = "1.8";

  temp.innerText = contenido;

  html2pdf().set({
    margin: 0.3, // 🔥 antes 0.5
    filename: `reporte_${lote}.pdf`,
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
  }).from(temp).save();
};

</script>
</body>
</html>
